<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BudgetFlow IQ</title>
  <meta name="description" content="Secure login for BudgetFlow IQ platform." />
  <link rel="stylesheet" href="css/style.css?v=8" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-page);
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand-wordmark h1 {
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .brand-wordmark p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r-md);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
      margin-top: 10px;
    }
    .btn-login:hover {
      background: var(--accent-hover);
    }
    .login-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .login-divider:not(:empty)::before { margin-right: .25em; }
    .login-divider:not(:empty)::after { margin-left: .25em; }
    
    .btn-google {
      width: 100%;
      padding: 10px;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background var(--transition);
    }
    .btn-google:hover {
      background: var(--bg-hover);
    }
    .error-msg {
      color: var(--color-danger);
      background: var(--color-danger-bg);
      padding: 10px;
      border-radius: var(--r-sm);
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="brand-wordmark">
        <h1>BudgetFlow IQ</h1>
        <p>GovTech Intelligence Platform</p>
      </div>
    </div>

    <div id="error-box" class="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="userId">Official Email / User ID</label>
        <input type="text" id="userId" class="form-input" placeholder="admin@gov.in" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Security Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="login-divider">OR</div>

    <button type="button" class="btn-google" id="btn-mock-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google Workspace
    </button>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('userId').value;
      const pass = document.getElementById('password').value;
      const errBox = document.getElementById('error-box');

      // Basic local mock validation: accept "admin" / "password" or any typical non-empty input for demonstration
      if (user.length >= 3 && pass.length >= 3) {
        sessionStorage.setItem('bfiq_auth', 'true');
        sessionStorage.setItem('bfiq_user', user);
        window.location.href = 'data-workspace.html';
      } else {
        errBox.style.display = 'block';
        errBox.textContent = 'Invalid credentials. Please enter a valid User ID and Password.';
      }
    });

    document.getElementById('btn-mock-google').addEventListener('click', function() {
      // Mock Google OAuth flow
      sessionStorage.setItem('bfiq_auth', 'true');
      sessionStorage.setItem('bfiq_user', 'System Administrator');
      window.location.href = 'data-workspace.html';
    });
  </script>

</body>
</html>
